<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ministry of Internal Affairs | Nomashae</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --accent: #4A7C59;
      --bg: #f7f7f5; --bg2: #efefec; --card: #ffffff;
      --ink: #1a1a1a; --ink2: #555550;
      --border: rgba(0,0,0,0.08); --shadow: 0 2px 12px rgba(0,0,0,0.07);
      --radius: 14px; --t: 0.3s ease;
    }
    [data-theme="dark"] {
      --bg: #141414; --bg2: #1e1e1e; --card: #242424;
      --ink: #f0f0ee; --ink2: #999992;
      --border: rgba(255,255,255,0.08); --shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    [data-element="air"]   { --accent: #5B9BBF; }
    [data-element="water"] { --accent: #3A8F8F; }
    [data-element="fire"]  { --accent: #C4622D; }
    [data-element="earth"] { --accent: #4A7C59; }
    [data-theme="dark"][data-element="air"]   { --accent: #7bb8d8; }
    [data-theme="dark"][data-element="water"] { --accent: #5abfbf; }
    [data-theme="dark"][data-element="fire"]  { --accent: #e07a4a; }
    [data-theme="dark"][data-element="earth"] { --accent: #6aad82; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg); color: var(--ink);
      line-height: 1.7; transition: background var(--t), color var(--t);
    }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 2.5rem; height: 64px;
      background: var(--bg); border-bottom: 1px solid var(--border);
      transition: background var(--t), border-color var(--t);
    }
    .nav-left { display: flex; align-items: center; gap: 0.75rem; }
    .back-link {
      display: flex; align-items: center; gap: 0.5rem;
      text-decoration: none; color: var(--ink2);
      font-size: 0.78rem; font-weight: 500; letter-spacing: 1px;
      text-transform: uppercase; transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }
    .back-link svg { width: 16px; height: 16px; fill: currentColor; }
    .nav-brand {
      font-size: 1rem; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: var(--accent); text-decoration: none;
      transition: color var(--t);
    }
    .nav-right { display: flex; gap: 0.5rem; }
    .nav-btn {
      background: transparent; border: 1.5px solid var(--border);
      color: var(--ink2); padding: 0.35rem 0.9rem; border-radius: 8px;
      cursor: pointer; font-family: 'Outfit', sans-serif;
      font-size: 0.72rem; font-weight: 500; letter-spacing: 1px;
      text-transform: uppercase; transition: all 0.2s;
      text-decoration: none; display: inline-block;
    }
    .nav-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .nav-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* HERO */
    .hero {
      padding: 5rem 2rem 4rem; text-align: center;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      position: relative; overflow: hidden;
      transition: background var(--t), border-color var(--t);
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 100%, color-mix(in srgb, var(--accent) 10%, transparent), transparent 70%);
      pointer-events: none; transition: background var(--t);
    }
    .hero-ministry {
      font-size: 0.65rem; font-weight: 600; letter-spacing: 4px;
      text-transform: uppercase; color: var(--accent); display: block;
      margin-bottom: 0.5rem; transition: color var(--t);
    }
    .hero-icon {
      width: 72px; height: 72px;
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      border-radius: 18px; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
      transition: background var(--t), border-color var(--t);
    }
    .hero-icon i { font-size: 1.8rem; color: var(--accent); transition: color var(--t); }
    .hero-title {
      font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 700;
      color: var(--ink); letter-spacing: 2px; margin-bottom: 0.5rem;
      transition: color var(--t);
    }
    .hero-sub {
      font-size: 0.9rem; color: var(--ink2); font-weight: 300;
      max-width: 560px; margin: 0 auto 1.5rem;
      transition: color var(--t);
    }
    .hero-sub-a {
        font-size: 1.5rem;
        color: var(--ink);
        font-weight: 300;
        max-width: 560px;
        margin: 0 auto 1.5rem;
        text-align: center;
        transition: color var(--ink);
        padding-top: 25px;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
      color: var(--accent); padding: 0.4rem 1rem; border-radius: 20px;
      font-size: 0.68rem; font-weight: 600; letter-spacing: 2px;
      text-transform: uppercase; transition: all var(--t);
    }

    /* SECTIONS */
    .section { padding: 4.5rem 2rem; border-top: 1px solid var(--border); transition: border-color var(--t); }
    .section.alt { background: var(--bg2); transition: background var(--t), border-color var(--t); }
    .section-inner { max-width: 960px; margin: 0 auto; }
    .sec-header { text-align: center; margin-bottom: 2.5rem; }
    .sec-label {
      font-size: 0.65rem; font-weight: 600; letter-spacing: 4px;
      text-transform: uppercase; color: var(--accent); display: block;
      margin-bottom: 0.5rem; transition: color var(--t);
    }
    .sec-title {
      font-size: clamp(1.3rem, 3vw, 1.9rem); font-weight: 700;
      color: var(--ink); letter-spacing: 1px; margin-bottom: 0.3rem;
      transition: color var(--t);
    }
    .sec-sub { font-size: 0.85rem; color: var(--ink2); font-weight: 300; transition: color var(--t); }

    .fade { opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .fade.in { opacity: 1; transform: none; }

    /* RESPONSIBILITY GRID */
    .resp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 6rem;
    }
    .resp-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.8rem;
      box-shadow: var(--shadow); position: relative; overflow: hidden;
      transition: background var(--t), border-color var(--t), transform 0.25s, box-shadow 0.25s;
    }
    .resp-card::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--accent); transform: scaleX(0); transform-origin: left;
      transition: transform 0.3s ease, background var(--t);
    }
    .resp-card:hover { transform: translateY(-4px); box-shadow: 0 12px 28px rgba(0,0,0,0.1); }
    .resp-card:hover::after { transform: scaleX(1); }
    .resp-icon {
      width: 40px; height: 40px;
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      margin-bottom: 1rem; transition: background var(--t);
    }
    .resp-icon i { font-size: 1rem; color: var(--accent); transition: color var(--t); }
    .resp-title { font-size: 0.95rem; font-weight: 700; color: var(--ink); margin-bottom: 0.4rem; transition: color var(--t); }
    .resp-desc { font-size: 0.82rem; font-weight: 300; color: var(--ink2); line-height: 1.7; transition: color var(--t); }

    /* REGIONS */
    .regions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }
    .region-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.8rem;
      box-shadow: var(--shadow); position: relative; overflow: hidden;
      transition: background var(--t), border-color var(--t), transform 0.25s, box-shadow 0.25s;
    }
    .region-card:hover { transform: translateY(-4px); box-shadow: 0 12px 28px rgba(0,0,0,0.1); }
    .region-card::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--region-color, var(--accent));
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.3s ease;
    }
    .region-card:hover::after { transform: scaleX(1); }

    /* region colour tokens */
    .region-water-n { --region-color: #3A8F8F; }
    .region-water-s { --region-color: #2a6e8e; }
    .region-air-e   { --region-color: #7bafd8; }
    .region-air-w   { --region-color: #5B9BBF; }
    .region-earth   { --region-color: #4A7C59; }
    .region-fire    { --region-color: #C4622D; }
    .region-capital { --region-color: #9B7FBF; }

    .region-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1rem;
      background: color-mix(in srgb, var(--region-color, var(--accent)) 12%, transparent);
    }
    .region-icon i { font-size: 1rem; color: var(--region-color, var(--accent)); }
    .region-element {
      font-size: 0.58rem; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: var(--region-color, var(--accent));
      display: block; margin-bottom: 0.3rem;
    }
    .region-name { font-size: 0.98rem; font-weight: 700; color: var(--ink); margin-bottom: 0.4rem; transition: color var(--t); }
    .region-desc { font-size: 0.80rem; font-weight: 300; color: var(--ink2); line-height: 1.7; transition: color var(--t); }

    /* CITIZEN SERVICES */
    .services-list { display: flex; flex-direction: column; gap: 0.8rem; max-width: 680px; margin: 0 auto; }
    .service-item {
      display: flex; gap: 1rem; align-items: flex-start;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 1.2rem 1.4rem;
      box-shadow: var(--shadow);
      transition: background var(--t), border-color var(--t), transform 0.2s;
    }
    .service-item:hover { transform: translateX(4px); }
    .service-icon {
      width: 36px; height: 36px; flex-shrink: 0; border-radius: 8px;
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      display: flex; align-items: center; justify-content: center;
      transition: background var(--t);
    }
    .service-icon i { font-size: 0.9rem; color: var(--accent); transition: color var(--t); }
    .service-info { flex: 1; }
    .service-name { font-size: 0.92rem; font-weight: 600; color: var(--ink); margin-bottom: 0.2rem; transition: color var(--t); }
    .service-desc { font-size: 0.80rem; font-weight: 300; color: var(--ink2); line-height: 1.6; transition: color var(--t); }

    /* MINISTER */
    .minister-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 2rem;
      display: flex; align-items: center; gap: 1.5rem;
      box-shadow: var(--shadow); max-width: 480px; margin: 0 auto;
      transition: background var(--t), border-color var(--t);
    }
    .minister-avatar {
      width: 60px; height: 60px; flex-shrink: 0;
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      border: 2px solid color-mix(in srgb, var(--accent) 30%, transparent);
      transition: background var(--t), border-color var(--t);
    }
    .minister-avatar i { font-size: 1.4rem; color: var(--accent); transition: color var(--t); }
    .minister-role {
      font-size: 0.6rem; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: var(--accent); display: block;
      margin-bottom: 0.3rem; transition: color var(--t);
    }
    .minister-name { font-size: 1.05rem; font-weight: 700; color: var(--ink); transition: color var(--t); }
    .minister-note { font-size: 0.78rem; color: var(--ink2); font-weight: 300; margin-top: 0.2rem; transition: color var(--t); }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border); text-align: center; padding: 2.5rem 1rem;
      font-size: 0.68rem; letter-spacing: 3px; text-transform: uppercase;
      color: var(--ink2); transition: border-color var(--t), color var(--t);
    }

    .docs {
      display: block;
      width: fit-content;
      
      text-decoration: none;
      background: var(--accent);
      border: none;
      color: #fff;
      padding: 0.85rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: opacity 0.2s;

      margin: 0 auto;
    }

    .img {
      transition: transform 0.25s ease;
      will-change: transform;
    }

    .img:hover {
        transform: scale(1.05);
    }

    @media (max-width: 600px) {
      nav { padding: 0 1rem; }
      .section { padding: 3rem 1.2rem; }
      .minister-card { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body data-theme="light" data-element="earth">

  <nav>
    <div class="nav-left">
      <a href="./mia.html" class="back-link">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        MIA
      </a>
      <a href="./index.html" class="nav-brand">Nomashae</a>
    </div>
    <div class="nav-right">
      <button class="nav-btn" id="dark-btn">Dark</button>
    </div>
  </nav>

  <!-- HERO -->
  <div class="hero">
    <span class="hero-ministry">Republic of Nomashae</span>
    <div class="hero-icon"><i class="fa-solid fa-landmark"></i></div>
    <h1 class="hero-title">Ministry of Internal Affairs - Archive</h1>
    <p class="hero-sub">Archive of Nomashae's Publicly Avaiably Documents</p>
  </div>

  <div class="section alt">
    <div class="section-inner fade">
        <div class="sec-header">
            <span class="sec-label">Archive</span>
            <h2 class="sec-title">Archive of Documents</h2>
        </div>
        <div class="krste-emplyment-1">
            <div class="resp-grid">       
                <a href="./assets/documents/KrsteRoleAccsept-Front.jpg" target="_blank" class="img"><img src="./assets/documents/KrsteRoleAccsept-Front.jpg" width="420" height="594"></a>
                <a href="./assets/documents/KrsteRoleAccsept-Back.jpg" target="_blank"  class="img"><img src="./assets/documents/KrsteRoleAccsept-Back.jpg" width="420" height="594"></a>
            </div>
            <p class="hero-sub-a">Krste AppaRider Dimov's Emplyment Document</p>
        </div>
    </div>
  </div>

  <footer><p>© 2026 Nomashae · Ministry of Internal Affairs · Powered by the Elements</p></footer>

  <script>
    function getElement() {
      const h = new Date().getHours();
      if (h >= 6  && h < 12) return 'air';
      if (h >= 12 && h < 18) return 'water';
      if (h >= 18 && h < 22) return 'fire';
      return 'earth';
    }
    document.body.setAttribute('data-element', getElement());

    const darkBtn = document.getElementById('dark-btn');
    let isDark = false;
    try { isDark = localStorage.getItem('nmDark') === 'true'; } catch(e) {}
    function applyDark() {
      document.body.setAttribute('data-theme', isDark ? 'dark' : 'light');
      darkBtn.classList.toggle('active', isDark);
      darkBtn.textContent = isDark ? 'Light' : 'Dark';
    }
    darkBtn.addEventListener('click', () => {
      isDark = !isDark;
      try { localStorage.setItem('nmDark', isDark); } catch(e) {}
      applyDark();
    });
    applyDark();

    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade').forEach(el => obs.observe(el));
  </script>
</body>
</html>
